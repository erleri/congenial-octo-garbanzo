name: Daily Dashboard Email

on:
  workflow_dispatch:
  schedule:
    # 09:15 KST every day.
    - cron: '15 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: daily-dashboard-email
  cancel-in-progress: false

jobs:
  generate-data-and-send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate exchange API secrets
        run: node scripts/validate-api-keys.js
        env:
          VITE_EXCHANGERATE_API_KEY: ${{ secrets.VITE_EXCHANGERATE_API_KEY }}
          VITE_ALPHA_VANTAGE_API_KEY: ${{ secrets.VITE_ALPHA_VANTAGE_API_KEY }}

      - name: Generate public/data.json
        run: npm run generate:data
        env:
          VITE_EXCHANGERATE_API_KEY: ${{ secrets.VITE_EXCHANGERATE_API_KEY }}
          VITE_ALPHA_VANTAGE_API_KEY: ${{ secrets.VITE_ALPHA_VANTAGE_API_KEY }}

      - name: Read dataset metadata
        id: dataset
        run: |
          BASE_DATE=$(jq -r '.baseDate // empty' public/data.json)
          FETCHED_AT=$(jq -r '.fetchedAt // empty' public/data.json)

          if [ -z "$BASE_DATE" ]; then
            echo "public/data.json is missing baseDate" >&2
            exit 1
          fi

          echo "base_date=$BASE_DATE" >> "$GITHUB_OUTPUT"
          echo "fetched_at=$FETCHED_AT" >> "$GITHUB_OUTPUT"

      - name: Create market context
        run: node scripts/create-market-context.js
        env:
          VITE_ALPHA_VANTAGE_API_KEY: ${{ secrets.VITE_ALPHA_VANTAGE_API_KEY }}

      - name: Compose email metadata
        id: email
        run: node scripts/compose-email.js

      - name: Commit updated dataset
        run: |
          if git diff --quiet -- public/data.json data/alpha-vantage-history.json; then
            echo "No dataset changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data.json data/alpha-vantage-history.json
            git commit -m "chore: refresh static exchange data"
            git push
          fi

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Create email chart
        run: node scripts/create-email-chart.js

      - name: Validate mailing list
        id: mailing
        run: |
          if [ ! -f "data/mailing_list.json" ]; then
            echo "No mailing list file found; email will be skipped."
            echo "emails=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -e 'type == "array" and all(.[]; type == "string" and test("^[^@\s]+@[^@\s]+\.[^@\s]+$"))' data/mailing_list.json > /dev/null

          EMAILS=$(jq -r 'join(",")' data/mailing_list.json)
          if [ -z "$EMAILS" ]; then
            echo "Mailing list is empty; email will be skipped."
          fi

          echo "emails=$EMAILS" >> "$GITHUB_OUTPUT"

      - name: Send dashboard email
        if: steps.mailing.outputs.emails != ''
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ steps.mailing.outputs.emails }}
          EMAIL_SUBJECT: ${{ steps.email.outputs.subject }}
          EMAIL_HTML_BODY: ${{ steps.email.outputs.html_body }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          username = os.environ.get("SMTP_USERNAME", "").strip()
          password = "".join(os.environ.get("SMTP_PASSWORD", "").split())
          recipients = [
              item.strip()
              for item in os.environ.get("EMAIL_TO", "").split(",")
              if item.strip()
          ]

          if not username:
              raise SystemExit("SMTP_USERNAME secret is missing or empty.")
          if not password:
              raise SystemExit("SMTP_PASSWORD secret is missing or empty.")
          if not recipients:
              raise SystemExit("No email recipients were provided.")

          chart_path = Path("email-chart.png")
          if not chart_path.exists():
              raise SystemExit("email-chart.png was not created.")

          message = EmailMessage()
          message["Subject"] = os.environ["EMAIL_SUBJECT"]
          message["From"] = f"LATAM FX Admin <{username}>"
          message["To"] = ", ".join(recipients)
          message.set_content("LATAM FX daily dashboard is included below.")
          message.add_alternative(os.environ["EMAIL_HTML_BODY"], subtype="html")

          html_part = message.get_payload()[1]
          html_part.add_related(
              chart_path.read_bytes(),
              maintype="image",
              subtype="png",
              cid="<fx-chart-image>",
              filename="email-chart.png",
          )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as smtp:
              smtp.login(username, password)
              smtp.send_message(message)
          PY

      - name: Upload dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-dashboard-email-${{ steps.dataset.outputs.base_date || github.run_id }}
          path: |
            email-chart.png
            email-chart-meta.json
            email-market-context.json
          if-no-files-found: warn
