name: Daily Dashboard Email

on:
  workflow_dispatch:
  schedule:
    # 09:15 KST every day.
    - cron: '15 0 * * *'

permissions:
  contents: write

concurrency:
  group: daily-dashboard-email
  cancel-in-progress: false

jobs:
  generate-data-and-send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate public/data.json
        run: npm run generate:data
        env:
          VITE_EXCHANGERATE_API_KEY: ${{ secrets.VITE_EXCHANGERATE_API_KEY }}
          VITE_ALPHA_VANTAGE_API_KEY: ${{ secrets.VITE_ALPHA_VANTAGE_API_KEY }}

      - name: Read dataset metadata
        id: dataset
        run: |
          BASE_DATE=$(jq -r '.baseDate // empty' public/data.json)
          FETCHED_AT=$(jq -r '.fetchedAt // empty' public/data.json)

          if [ -z "$BASE_DATE" ]; then
            echo "public/data.json is missing baseDate" >&2
            exit 1
          fi

          echo "base_date=$BASE_DATE" >> "$GITHUB_OUTPUT"
          echo "fetched_at=$FETCHED_AT" >> "$GITHUB_OUTPUT"

      - name: Compose email metadata
        id: email
        env:
          BASE_DATE: ${{ steps.dataset.outputs.base_date }}
          FETCHED_AT: ${{ steps.dataset.outputs.fetched_at }}
        run: |
          python - <<'PY'
          import os

          base_date = os.environ["BASE_DATE"]
          fetched_at = os.environ.get("FETCHED_AT") or "-"
          subject = f"[LATAM FX] {base_date} \uc911\ub0a8\ubbf8 \ud658\uc728 \ub300\uc2dc\ubcf4\ub4dc"
          html = f"""\
          <h2>LATAM FX \uc77c\uc77c \ub300\uc2dc\ubcf4\ub4dc</h2>
          <p>\uc5c5\ub370\uc774\ud2b8\ub41c \uccab \ub300\uc2dc\ubcf4\ub4dc \ud654\uba74\uc744 \ucca8\ubd80\ud588\uc2b5\ub2c8\ub2e4.</p>
          <ul>
            <li><strong>\uae30\uc900\uc77c</strong>: {base_date}</li>
            <li><strong>\ucd5c\uc885 \uac31\uc2e0</strong>: {fetched_at}</li>
            <li><strong>\ub370\uc774\ud130 \ucd9c\ucc98</strong>: ExchangeRate API, Alpha Vantage, \ubcf4\uc815 \ub370\uc774\ud130</li>
            <li><strong>\ubcf4\uc815 \ud3ec\ud568</strong>: \uc608</li>
          </ul>
          <p>\uc0c1\uc138 \ud654\uba74: <a href="https://latamforex.netlify.app/">LATAM FX Dashboard</a></p>
          """

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"subject={subject}", file=output)
              print("html_body<<HTML", file=output)
              print(html, file=output)
              print("HTML", file=output)
          PY

      - name: Commit updated dataset
        run: |
          if git diff --quiet -- public/data.json data/alpha-vantage-history.json; then
            echo "No dataset changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data.json data/alpha-vantage-history.json
            git commit -m "chore: refresh static exchange data"
            git push
          fi

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Build frontend for screenshot
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid

      - name: Wait for preview server
        run: |
          for i in {1..60}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Preview server did not become ready" >&2
          cat preview.log >&2
          exit 1

      - name: Take and validate dashboard screenshot
        run: node scripts/take-screenshot.js
        env:
          DASHBOARD_URL: http://127.0.0.1:4173/

      - name: Validate mailing list
        id: mailing
        run: |
          if [ ! -f "data/mailing_list.json" ]; then
            echo "No mailing list file found; email will be skipped."
            echo "emails=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -e 'type == "array" and all(.[]; type == "string" and test("^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"))' data/mailing_list.json > /dev/null

          EMAILS=$(jq -r 'join(",")' data/mailing_list.json)
          if [ -z "$EMAILS" ]; then
            echo "Mailing list is empty; email will be skipped."
          fi

          echo "emails=$EMAILS" >> "$GITHUB_OUTPUT"

      - name: Send dashboard email
        if: steps.mailing.outputs.emails != ''
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ steps.mailing.outputs.emails }}
          EMAIL_SUBJECT: ${{ steps.email.outputs.subject }}
          EMAIL_HTML_BODY: ${{ steps.email.outputs.html_body }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          username = os.environ.get("SMTP_USERNAME", "").strip()
          password = "".join(os.environ.get("SMTP_PASSWORD", "").split())
          recipients = [
              item.strip()
              for item in os.environ.get("EMAIL_TO", "").split(",")
              if item.strip()
          ]

          if not username:
              raise SystemExit("SMTP_USERNAME secret is missing or empty.")
          if not password:
              raise SystemExit("SMTP_PASSWORD secret is missing or empty.")
          if not recipients:
              raise SystemExit("No email recipients were provided.")

          screenshot_path = Path("dashboard.png")
          if not screenshot_path.exists():
              raise SystemExit("dashboard.png was not created.")

          message = EmailMessage()
          message["Subject"] = os.environ["EMAIL_SUBJECT"]
          message["From"] = f"LATAM FX Admin <{username}>"
          message["To"] = ", ".join(recipients)
          message.set_content("LATAM FX daily dashboard is attached.")
          message.add_alternative(os.environ["EMAIL_HTML_BODY"], subtype="html")

          message.add_attachment(
              screenshot_path.read_bytes(),
              maintype="image",
              subtype="png",
              filename="dashboard.png",
          )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as smtp:
              smtp.login(username, password)
              smtp.send_message(message)
          PY

      - name: Upload dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-dashboard-email-${{ steps.dataset.outputs.base_date || github.run_id }}
          path: |
            dashboard.png
            dashboard-meta.json
            preview.log
          if-no-files-found: warn
